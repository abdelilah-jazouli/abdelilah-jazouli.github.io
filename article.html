<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="" id="metaDescription">
    <meta property="og:title" content="Article — Azeka Consulting" id="ogTitle">
    <meta property="og:description" content="" id="ogDescription">
    <meta property="og:type" content="article">
    <meta property="og:url" content="" id="ogUrl">
    <meta property="og:image" content="https://www.azeka-consulting.com/images/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="" id="twTitle">
    <meta name="twitter:description" content="" id="twDescription">
    <meta name="twitter:image" content="https://www.azeka-consulting.com/images/og-image.png">
    <link rel="canonical" href="" id="canonicalLink">
    <title>Article — Azeka Consulting</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/blog.css">
    <!-- highlight.js theme -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark-dimmed.min.css">
    <link rel="icon" type="image/png" href="images/favicon.png">
</head>

<body>

    <!-- ========== NAVIGATION ========== -->
    <nav class="navbar scrolled" id="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo">
                <img src="images/logo_128.png" alt="Azeka Consulting" class="nav-logo-svg">
                <span class="nav-logo-text">
                    <span class="nav-logo-azeka">AZEKA</span>
                    <span class="nav-logo-consulting">CONSULTING</span>
                </span>
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html#services">Services</a></li>
                <li><a href="index.html#expertise">Expertise</a></li>
                <li><a href="index.html#technologies">Technologies</a></li>
                <li><a href="index.html#references">Références</a></li>
                <li><a href="blog.html" class="active">Blog</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li><a href="index.html#contact" class="btn btn-primary nav-cta">Prendre RDV</a></li>
            </ul>
            <button class="mobile-toggle" id="mobileToggle" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- ========== ARTICLE ========== -->
    <main class="article-page">
        <div class="container">
            <!-- Back link -->
            <a href="blog.html" class="article-back" id="articleBack">← Retour au blog</a>

            <div class="article-layout">
                <!-- Article Main -->
                <article>
                    <!-- Header (generated by JS) -->
                    <div class="article-header" id="articleHeader">
                        <!-- Tags, title, meta injected by JS -->
                    </div>

                    <!-- Content (rendered Markdown) -->
                    <div class="article-content" id="articleContent">
                        <div style="text-align:center; padding:80px 0; color:var(--text-muted);">
                            <p>⏳ Chargement de l'article...</p>
                        </div>
                    </div>

                    <!-- Prev/Next Navigation -->
                    <div class="article-nav" id="articleNav">
                        <!-- Generated by JS -->
                    </div>
                </article>

                <!-- Table of Contents Sidebar -->
                <aside class="toc-sidebar">
                    <div class="glass-card toc-card" id="tocCard">
                        <h4>Sommaire</h4>
                        <ul class="toc-list" id="tocList">
                            <!-- Generated by JS after Markdown render -->
                        </ul>
                    </div>
                </aside>
            </div>
        </div>
    </main>

    <!-- ========== FOOTER ========== -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Azeka Consulting. Tous droits réservés.</p>
                <div class="footer-bottom-links">
                    <a href="blog.html">Blog</a>
                    <a href="index.html#contact">Contact</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-highlight@2.1.1/lib/index.umd.min.js"></script>
    <script src="js/blog.js"></script>
</body>

</html>
