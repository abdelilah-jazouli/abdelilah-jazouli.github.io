<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <title>Article — Azeka Consulting</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/blog.css">
    <!-- highlight.js theme -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark-dimmed.min.css">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2300d4ff'/%3E%3Cstop offset='100%25' stop-color='%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='url(%23g)'/%3E%3Ctext x='50' y='68' font-family='sans-serif' font-size='55' font-weight='bold' fill='%230a0a1a' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E">
</head>

<body>

    <!-- ========== NAVIGATION ========== -->
    <nav class="navbar scrolled" id="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo">
                <span class="nav-logo-icon">A</span>
                Azeka Consulting
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html#services">Services</a></li>
                <li><a href="index.html#expertise">Expertise</a></li>
                <li><a href="index.html#technologies">Technologies</a></li>
                <li><a href="index.html#references">Références</a></li>
                <li><a href="blog.html" class="active">Blog</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li><a href="index.html#contact" class="btn btn-primary nav-cta">Prendre RDV</a></li>
            </ul>
            <button class="mobile-toggle" id="mobileToggle" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- ========== ARTICLE ========== -->
    <main class="article-page">
        <div class="container">
            <!-- Back link -->
            <a href="blog.html" class="article-back" id="articleBack">← Retour au blog</a>

            <div class="article-layout">
                <!-- Article Main -->
                <article>
                    <!-- Header (generated by JS) -->
                    <div class="article-header" id="articleHeader">
                        <!-- Tags, title, meta injected by JS -->
                    </div>

                    <!-- Content (rendered Markdown) -->
                    <div class="article-content" id="articleContent">
                        <div style="text-align:center; padding:80px 0; color:var(--text-muted);">
                            <p>⏳ Chargement de l'article...</p>
                        </div>
                    </div>

                    <!-- Prev/Next Navigation -->
                    <div class="article-nav" id="articleNav">
                        <!-- Generated by JS -->
                    </div>
                </article>

                <!-- Table of Contents Sidebar -->
                <aside class="toc-sidebar">
                    <div class="glass-card toc-card" id="tocCard">
                        <h4>Sommaire</h4>
                        <ul class="toc-list" id="tocList">
                            <!-- Generated by JS after Markdown render -->
                        </ul>
                    </div>
                </aside>
            </div>
        </div>
    </main>

    <!-- ========== FOOTER ========== -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2025 Azeka Consulting. Tous droits réservés.</p>
                <div class="footer-bottom-links">
                    <a href="blog.html">Blog</a>
                    <a href="index.html#contact">Contact</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-highlight@2.1.1/lib/index.umd.min.js"></script>
    <script src="js/blog.js"></script>
</body>

</html>
